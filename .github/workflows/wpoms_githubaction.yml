name: Build, Push to ECR, and Deploy to EC2

on:
  push:
    branches: [ "main" ] # Triggers the workflow whenever you push to the main branch

env:
  AWS_REGION: ap-south-1                  # Replace with your AWS region
  ECR_REPOSITORY: ecr-wpoms-repo  # Replace with your ECR repository name
  CONTAINER_NAME: wpoms-container      # What you want to name the running container on EC2
  APP_PORT: 8080                         # The port your app runs on inside the container
  HOST_PORT: 80                          # The port you want to expose on your EC2 instance

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push Image to ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }} # Uses the commit hash as the unique image tag
      run: |
        # Build the docker container
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        # Also tag it as 'latest' so the EC2 script can always pull the newest version easily
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        
        # Push both tags to ECR
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push # Ensures deployment only happens if the build/push succeeds

    steps:
    - name: Configure AWS Credentials (for ECR login helper on EC2 if needed)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Log in to Amazon ECR (to get registry URL)
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: SSH into EC2 and Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_REGION
        script: |
          # 1. Install AWS CLI and Docker on EC2 if they aren't already there
          if ! command -v aws &> /dev/null; then sudo apt-get update && sudo apt-get install -y awscli || sudo yum install -y aws-cli; fi
          if ! command -v docker &> /dev/null; then sudo apt-get update && sudo apt-get install -y docker.io || sudo amazon-linux-extras install docker -y || sudo yum install -y docker; sudo systemctl start docker && sudo systemctl enable docker; fi
          
          # 2. Authenticate Docker on the EC2 instance with your ECR registry
          AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY aws ecr get-login-password --region ${{ env.AWS_REGION }} | sudo docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
          
          # 3. Pull the latest image
          sudo docker pull ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          
          # 4. Stop and remove the existing container if it's running
          sudo docker stop ${{ env.CONTAINER_NAME }} || true
          sudo docker rm ${{ env.CONTAINER_NAME }} || true
          
          # 5. Run the new container
          sudo docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            -p ${{ env.HOST_PORT }}:${{ env.APP_PORT }} \
            --restart always \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            